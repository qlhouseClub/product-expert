name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Build every platform package
        run: python scripts/build_compat.py --platform all

      - name: Create release and upload platform packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=(
            dist/trae/product-expert.zip
            dist/openai/product-expert-plugin.zip
            dist/coze/product-expert-coze.zip
            dist/portable/product-expert.zip
          )
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --verify-tag \
              --generate-notes \
              --title "$GITHUB_REF_NAME"
          fi
