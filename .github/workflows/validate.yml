name: Validate

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install YAML validator
        run: python -m pip install --disable-pip-version-check pyyaml==6.0.2

      - name: Validate metadata and public files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import yaml

          root = Path(".")
          required = (
              "README.md",
              "LICENSE",
              "SECURITY.md",
              "CONTRIBUTING.md",
              "THIRD_PARTY_NOTICES.md",
              "COMPATIBILITY.md",
          )
          for relative in required:
              assert (root / relative).is_file(), f"missing {relative}"

          skill_text = (root / "SKILL.md").read_text(encoding="utf-8")
          assert skill_text.startswith("---"), "SKILL.md frontmatter missing"
          frontmatter = yaml.safe_load(skill_text.split("---", 2)[1])
          manifest = json.loads((root / "platforms/manifest.json").read_text(encoding="utf-8"))
          openai = yaml.safe_load((root / "agents/openai.yaml").read_text(encoding="utf-8"))

          assert frontmatter["name"] == manifest["skill"]["name"]
          assert isinstance(openai, dict) and openai
          assert manifest["skill"]["repository"].startswith("https://github.com/")
          print("Metadata and public files are valid.")
          PY

      - name: Build every platform package
        run: python scripts/build_compat.py --platform all

      - name: Verify release archives
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          archives = (
              Path("dist/trae/product-expert.zip"),
              Path("dist/openai/product-expert-plugin.zip"),
              Path("dist/coze/product-expert-coze.zip"),
              Path("dist/portable/product-expert.zip"),
          )
          for archive in archives:
              assert archive.is_file(), f"missing {archive}"
              with ZipFile(archive) as package:
                  assert any(name.endswith("SKILL.md") or name.endswith("00-skill-core.md")
                             for name in package.namelist()), f"skill core missing from {archive}"
          print("All platform archives are valid.")
          PY
